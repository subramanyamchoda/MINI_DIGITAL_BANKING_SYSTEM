<!DOCTYPE html>
<html>
<head>
    <title>Mini Digital Banking System</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            text-align: center;
            padding: 30px;
        }
        .container {
            background: white;
            padding: 20px;
            width: 350px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #ccc;
        }
        input {
            width: 90%;
            padding: 8px;
            margin: 5px;
        }
        button {
            padding: 10px;
            width: 95%;
            background: #007bff;
            color: white;
            border: none;
            margin-top: 10px;
            cursor: pointer;
        }
        h2 {
            color: #333;
        }
    </style>
</head>
<body>

<h1>🏦 Mini Digital Banking System</h1>

<div class="container">
    <h2>Account Details</h2>
    <p><b>User 1 Balance:</b> ₹<span id="user1">1000</span></p>
    <p><b>User 2 Balance:</b> ₹<span id="user2">500</span></p>

    <h2>Transfer Money</h2>
    <input type="number" id="amount" placeholder="Enter Amount">
    <select id="from">
        <option value="1">From User 1</option>
        <option value="2">From User 2</option>
    </select>
    <select id="to">
        <option value="2">To User 2</option>
        <option value="1">To User 1</option>
    </select>

    <button onclick="transfer()">Transfer</button>

    <p id="msg"></p>
</div>

<script>
    let user1 = 1000;
    let user2 = 500;

    function transfer() {
        let amount = parseInt(document.getElementById("amount").value);
        let from = document.getElementById("from").value;
        let to = document.getElementById("to").value;
        let msg = document.getElementById("msg");

        if (from === to) {
            msg.innerText = "Cannot transfer to same account";
            return;
        }

        if (from == "1") {
            if (user1 >= amount) {
                user1 -= amount;
                user2 += amount;
                msg.innerText = "Transfer Successful!";
            } else {
                msg.innerText = "Insufficient Balance!";
            }
        } else {
            if (user2 >= amount) {
                user2 -= amount;
                user1 += amount;
                msg.innerText = "Transfer Successful!";
            } else {
                msg.innerText = "Insufficient Balance!";
            }
        }

        document.getElementById("user1").innerText = user1;
        document.getElementById("user2").innerText = user2;
    }
</script>

</body>
</html>
